<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Hankv Blog</title>
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff; --text: #1a1a1a;
      --border: #d0d0d0; --accent: #0051c3;
      --card: #f8f8f8; --danger: #c0392b;
    }
    [data-theme="dark"] {
      --bg: #111111; --text: #e0e0e0;
      --border: #333; --accent: #5b9bd5;
      --card: #1a1a1a; --danger: #e74c3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background .3s, color .3s;
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px;
      flex-wrap: wrap; gap: 8px;
    }
    .top-bar h1 { font-size: 1.3rem; }
    .top-bar a { color: var(--text); text-decoration: none; opacity: .7; font-size: .9rem; }
    .top-bar a:hover { opacity: 1; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lang-select {
      padding: 2px 6px; font-size: 0.8rem;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; opacity: 0.7; border-radius: 4px; cursor: pointer;
    }
    .lang-select:focus { opacity: 1; }

    .welcome { margin-bottom: 32px; }
    .welcome h2 { font-size: 1.6rem; margin-bottom: 6px; }
    .welcome p { opacity: .6; font-size: .95rem; }

    .cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      display: block; text-decoration: none; color: var(--text);
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 28px 24px; transition: transform .15s, border-color .15s, box-shadow .15s;
    }
    .card:hover {
      transform: translateY(-3px); border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .card.danger:hover { border-color: var(--danger); }
    .card-icon { font-size: 2rem; margin-bottom: 14px; }
    .card-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 6px; }
    .card-desc { font-size: .88rem; opacity: .65; line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 data-i18n="blog_admin">Blog Admin</h1>
    <div class="top-bar-right">
      <a href="/" target="_blank" data-i18n="view_site">View Site</a>
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <button class="lang-select" onclick="toggleTheme()" title="Theme">&#9728;/&#9790;</button>
      <button class="lang-select" onclick="logout()" data-i18n="logout">Logout</button>
    </div>
  </div>

  <div class="welcome">
    <h2 data-i18n="dashboard_welcome">Admin Dashboard</h2>
    <p data-i18n="dashboard_sub">Manage your blog content here.</p>
  </div>

  <div class="cards">
    <a class="card" href="posts.html">
      <div class="card-icon">&#128221;</div>
      <div class="card-title" data-i18n="manage_posts">Manage Posts</div>
      <div class="card-desc" data-i18n="manage_posts_desc">Edit, publish and delete your posts.</div>
    </a>
    <a class="card" href="write.html">
      <div class="card-icon">&#9998;</div>
      <div class="card-title" data-i18n="write_post">Write Post</div>
      <div class="card-desc" data-i18n="write_post_desc">Create a new article.</div>
    </a>
    <a class="card" href="comments.html">
      <div class="card-icon">&#128172;</div>
      <div class="card-title" data-i18n="manage_comments">Manage Comments</div>
      <div class="card-desc" data-i18n="manage_comments_desc">Review and delete reader comments.</div>
    </a>
    <a class="card danger" href="#" onclick="logout()">
      <div class="card-icon">&#128682;</div>
      <div class="card-title" data-i18n="logout">Logout</div>
      <div class="card-desc" data-i18n="logout_desc">Sign out of the admin panel.</div>
    </a>
  </div>
</div>

<script src="/i18n.js"></script>
<script src="common.js"></script>
<script>
  function boot() {
    if (!requireAuth()) return;
  }
  boot();
</script>
</body>
</html>
