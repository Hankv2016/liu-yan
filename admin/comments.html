<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Comments — Hankv Blog</title>
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff; --text: #1a1a1a;
      --border: #d0d0d0; --accent: #0051c3;
      --card: #f8f8f8; --danger: #c0392b;
    }
    [data-theme="dark"] {
      --bg: #111111; --text: #e0e0e0;
      --border: #333; --accent: #5b9bd5;
      --card: #1a1a1a; --danger: #e74c3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background .3s, color .3s;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
      flex-wrap: wrap; gap: 8px;
    }
    .top-bar h1 { font-size: 1.3rem; }
    .top-bar a { color: var(--text); text-decoration: none; opacity: .7; font-size: .9rem; }
    .top-bar a:hover { opacity: 1; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lang-select {
      padding: 2px 6px; font-size: 0.8rem;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; opacity: 0.7; border-radius: 4px; cursor: pointer;
    }
    .lang-select:focus { opacity: 1; }
    .btn {
      padding: 10px 28px; border: none; background: var(--accent); color: #fff;
      font-size: 1rem; border-radius: 4px; cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-danger { background: var(--danger); }
    .btn-sm { padding: 4px 12px; font-size: .85rem; }

    .filter-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 24px; padding: 14px 16px; background: var(--card);
      border-radius: 6px;
    }
    .filter-bar label { font-size: .9rem; opacity: .8; }
    .filter-bar select {
      padding: 8px 12px; border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .95rem; outline: none; border-radius: 4px; min-width: 240px;
    }
    .filter-bar select:focus { border-color: var(--accent); }
    .msg { font-size: .9rem; opacity: .7; }

    .comment-list h3 { margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
    .comment-item {
      background: var(--card); border-radius: 6px; padding: 14px 16px; margin-bottom: 10px;
    }
    .comment-item .c-head {
      display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      margin-bottom: 8px;
    }
    .comment-item .c-author { font-weight: 600; }
    .comment-item .c-time { font-size: .8rem; opacity: .6; }
    .comment-item .c-body {
      white-space: pre-wrap; word-break: break-word; margin-bottom: 12px;
      font-size: .95rem; line-height: 1.6;
    }
    .comment-item .c-actions { display: flex; justify-content: flex-end; }

    @media (max-width: 600px) {
      .container { padding: 16px 14px; }
      .top-bar { margin-bottom: 18px; }
      .filter-bar { gap: 8px; }
      .filter-bar select { min-width: 0; width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 data-i18n="manage_comments">Manage Comments</h1>
    <div class="top-bar-right">
      <a href="posts.html" data-i18n="manage_posts">Posts</a>
      <a href="/" target="_blank" data-i18n="view_site">View Site</a>
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <button class="btn btn-sm btn-outline" onclick="toggleTheme()">&#9728;/&#9790;</button>
      <button class="btn btn-sm btn-outline" onclick="logout()" data-i18n="logout">Logout</button>
    </div>
  </div>

  <div class="filter-bar">
    <label data-i18n="select_post">Select a post:</label>
    <select id="postSelect"></select>
    <span class="msg" id="cmtMsg"></span>
  </div>

  <div class="comment-list">
    <h3 data-i18n="comments_title">Comments</h3>
    <div id="commentList"></div>
  </div>
</div>

<script src="/i18n.js"></script>
<script src="common.js"></script>
<script>
  function cmtMsg(text, isErr) {
    var el = document.getElementById("cmtMsg");
    el.textContent = text;
    el.style.color = isErr ? "var(--danger)" : "";
    setTimeout(function() { el.textContent = ""; }, 3000);
  }

  // ===== 启动：先校验登录态 =====
  function boot() {
    if (!requireAuth()) return;
    loadPostOptions();
  }

  async function loadPostOptions() {
    var sel = document.getElementById("postSelect");
    try {
      var res = await fetch("/api/posts");
      if (!res.ok) throw new Error("load failed");
      var posts = await res.json();
      if (!posts.length) {
        sel.innerHTML = '<option>' + tt("no_posts_yet") + '</option>';
        return;
      }
      sel.innerHTML = posts.map(function(p) {
        return '<option value="' + esc(p.slug) + '">' + esc(p.title) + '</option>';
      }).join("");
      sel.onchange = function() { loadComments(sel.value); };
      loadComments(sel.value); // 默认加载第一篇
    } catch (e) {
      sel.innerHTML = '<option>' + tt("load_posts_failed") + '</option>';
    }
  }

  async function loadComments(slug) {
    var box = document.getElementById("commentList");
    box.innerHTML = '<p class="msg">' + tt("loading") + '</p>';
    try {
      var res = await fetch("/api/comments/" + encodeURIComponent(slug));
      if (!res.ok) throw new Error("load failed");
      var list = await res.json();
      if (!list.length) {
        box.innerHTML = '<p class="msg">' + tt("no_comments") + '</p>';
        return;
      }
      box.innerHTML = list.map(function(c) {
        var time = new Date(c.created_at).toLocaleString();
        return '<div class="comment-item">' +
          '<div class="c-head"><span class="c-author">' + esc(c.author) + '</span>' +
          '<span class="c-time">' + esc(time) + '</span></div>' +
          '<div class="c-body">' + esc(c.content) + '</div>' +
          '<div class="c-actions"><button class="btn btn-sm btn-danger" onclick="deleteComment(\'' +
          esc(slug) + "', '" + esc(c.id) + '\')">' + tt("delete") + '</button></div>' +
          '</div>';
      }).join("");
    } catch (e) {
      box.innerHTML = '<p class="msg">' + tt("load_comments_failed") + '</p>';
    }
  }

  async function deleteComment(slug, id) {
    if (!confirm(tt("delete_comment_confirm"))) return;
    try {
      var res = await fetch("/api/comments/" + encodeURIComponent(slug) + "/" + encodeURIComponent(id), {
        method: "DELETE", headers: authHeaders()
      });
      if (res.status === 401) return logout();
      if (!res.ok) {
        var e = await res.json().catch(function() { return {}; });
        return cmtMsg(tt("error_prefix") + (e.error || tt("unknown")), true);
      }
      loadComments(slug);
    } catch (e) {
      cmtMsg(tt("delete_error") + ": " + e.message, true);
    }
  }

  boot();
</script>
</body>
</html>
