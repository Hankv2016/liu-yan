<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Posts — Hankv Blog</title>
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff; --text: #1a1a1a;
      --border: #d0d0d0; --accent: #0051c3;
      --card: #f8f8f8; --danger: #c0392b;
    }
    [data-theme="dark"] {
      --bg: #111111; --text: #e0e0e0;
      --border: #333; --accent: #5b9bd5;
      --card: #1a1a1a; --danger: #e74c3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background .3s, color .3s;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
      flex-wrap: wrap; gap: 8px;
    }
    .top-bar h1 { font-size: 1.3rem; }
    .top-bar a { color: var(--text); text-decoration: none; opacity: .7; font-size: .9rem; }
    .top-bar a:hover { opacity: 1; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lang-select {
      padding: 2px 6px; font-size: 0.8rem;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; opacity: 0.7; border-radius: 4px; cursor: pointer;
    }
    .lang-select:focus { opacity: 1; }

    .btn {
      padding: 10px 28px; border: none; background: var(--accent); color: #fff;
      font-size: 1rem; border-radius: 4px; cursor: pointer; transition: opacity .2s;
      text-decoration: none; display: inline-block;
    }
    .btn:hover { opacity: .85; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-danger { background: var(--danger); }
    .btn-sm { padding: 4px 12px; font-size: .85rem; }
    .post-list .actions a.btn { text-decoration: none; }

    /* 文章列表 */
    .post-list { margin-top: 12px; }
    .post-list h3 { margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
    .post-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: var(--card); border-radius: 6px; margin-bottom: 8px;
    }
    .post-item .info { flex: 1; min-width: 0; }
    .post-item .title { font-weight: 600; margin-bottom: 2px; }
    .post-item .meta { font-size: .8rem; opacity: .6; }
    .post-item .actions { display: flex; gap: 8px; flex-shrink: 0; }

    @media (max-width: 600px) {
      .container { padding: 16px 14px; }
      .top-bar { margin-bottom: 18px; }
      .post-item { flex-direction: column; align-items: flex-start; gap: 10px; }
      .post-item .actions { width: 100%; flex-wrap: wrap; }
      .post-item .actions .btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 data-i18n="manage_posts">Manage Posts</h1>
    <div class="top-bar-right">
      <a href="comments.html" data-i18n="manage_comments">Comments</a>
      <a href="write.html" data-i18n="write_post">Write Post</a>
      <a href="/" target="_blank" data-i18n="view_site">View Site</a>
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <button class="lang-select" onclick="toggleTheme()" title="Theme">&#9728;/&#9790;</button>
      <button class="btn btn-sm btn-outline" onclick="logout()" data-i18n="logout">Logout</button>
    </div>
  </div>

  <!-- ===== 文章列表（看文章 / 管理） ===== -->
  <div class="post-list">
    <h3 data-i18n="all_posts">All Posts</h3>
    <div id="postList"></div>
  </div>
</div>

<script src="/i18n.js"></script>
<script src="common.js"></script>
<script>
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ===== 文章列表 =====
  async function loadPosts() {
    var container = document.getElementById("postList");
    try {
      var res = await fetch("/api/posts");
      if (!res.ok) throw new Error("Load failed");
      var posts = await res.json();
      if (!posts.length) {
        container.innerHTML = "<p style='opacity:.5'>" + tt("no_posts_yet") + "</p>";
        return;
      }
      container.innerHTML = posts.map(function(p) {
        var viewUrl = "/post.html?slug=" + encodeURIComponent(p.slug);
        var editUrl = "write.html?edit=" + encodeURIComponent(p.slug);
        return '<div class="post-item">' +
          '<div class="info"><div class="title">' + esc(p.title) + '</div>' +
          '<div class="meta">' + esc(p.slug) + ' &middot; ' + new Date(p.created_at).toLocaleDateString() + ' &middot; ' + esc(p.category || '') + '</div></div>' +
          '<div class="actions">' +
            '<a class="btn btn-sm btn-outline" href="' + viewUrl + '" target="_blank">' + tt("view_post") + '</a> ' +
            '<a class="btn btn-sm btn-outline" href="' + editUrl + '">' + tt("edit") + '</a> ' +
            '<button class="btn btn-sm btn-danger" onclick="deletePost(\'' + esc(p.slug) + '\')">' + tt("delete") + '</button>' +
          '</div></div>';
      }).join("");
    } catch (e) {
      container.innerHTML = "<p style='opacity:.5'>" + tt("load_posts_failed") + "</p>";
    }
  }

  async function deletePost(slug) {
    var m = tt("delete_confirm", { slug: slug });
    if (!confirm(m)) return;
    try {
      var res = await fetch("/api/posts/" + slug, { method: "DELETE", headers: authHeaders() });
      if (res.status === 401) return logout();
      if (!res.ok) throw new Error("Delete failed");
      loadPosts();
    } catch (e) {
      alert(tt("delete_error") + ": " + e.message);
    }
  }

  // ===== 启动：先校验登录态，通过后再加载列表 =====
  function boot() {
    if (!requireAuth()) return;
    loadPosts();
  }
  boot();
</script>
</body>
</html>
