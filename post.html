<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — Hankv Blog</title>
  <meta name="description" content="" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="" />
  <meta property="og:url" content="" />
  <meta property="og:site_name" content="Hankv Blog" />
  <meta property="og:description" content="" />
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff; --text: #1a1a1a; --muted: #777; --border: #e0e0e0;
    }
    [data-theme="dark"] {
      --bg: #111111; --text: #e0e0e0; --muted: #999; --border: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font: 16px/1.75 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background .3s, color .3s;
    }
    .container { max-width: 780px; margin: 0 auto; padding: 32px 20px; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 40px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 8px;
    }
    nav a { color: var(--text); text-decoration: none; opacity: .7; font-size: .9rem; }
    nav a:hover { opacity: 1; }
    nav .home { font-weight: 600; font-size: 1rem; opacity: 1; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .lang-select {
      padding: 2px 6px; font-size: 0.8rem;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; opacity: 0.7; border-radius: 4px; cursor: pointer;
    }
    .lang-select:focus { opacity: 1; }

    .post-header { margin-bottom: 36px; }
    .post-header h1 { font-size: 2rem; line-height: 1.3; margin-bottom: 12px; }
    .post-header .meta { color: var(--muted); font-size: .9rem; display: flex; gap: 16px; flex-wrap: wrap; }
    .post-header .tag { padding: 2px 10px; border: 1px solid var(--text); border-radius: 14px; font-size: .8rem; opacity: .6; }

    .post-body { word-break: break-word; }
    .post-body h2 { margin: 36px 0 16px; font-size: 1.4rem; }
    .post-body h3 { margin: 28px 0 12px; font-size: 1.15rem; }
    .post-body p { margin-bottom: 16px; }
    .post-body img { max-width: 100%; border-radius: 6px; margin: 12px 0; }
    .post-body pre {
      background: rgba(128,128,128,.1); padding: 16px; border-radius: 6px;
      overflow-x: auto; font-size: .9rem; line-height: 1.6; margin: 16px 0;
    }
    .post-body code { font-size: .9em; background: rgba(128,128,128,.1); padding: 2px 6px; border-radius: 3px; }
    .post-body pre code { background: none; padding: 0; border-radius: 0; }
    .post-body blockquote {
      border-left: 3px solid var(--border); padding-left: 16px; color: var(--muted); margin: 16px 0;
    }
    .post-body a { color: #1a73e8; }
    .post-body ul, .post-body ol { margin: 12px 0; padding-left: 24px; }
    .post-body li { margin-bottom: 4px; }
    .post-body table { border-collapse: collapse; margin: 16px 0; width: 100%; }
    .post-body th, .post-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .post-body th { background: rgba(128,128,128,.1); }

    .loading, .error { text-align: center; padding: 80px 0; color: var(--muted); }
    .error button { margin-top: 16px; }
    .error a { color: #1a73e8; }

    .back-link { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border); }
    .back-link a { color: var(--text); opacity: .6; text-decoration: none; }
    .back-link a:hover { opacity: 1; }

    /* 评论区 */
    .comment-section { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
    .comment-section h3 { margin-bottom: 20px; font-size: 1.15rem; }
    .comment-form { margin-bottom: 32px; }
    .comment-form .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .comment-form input, .comment-form textarea {
      padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text); font-size: .9rem; outline: none;
      font-family: inherit; transition: border-color .2s;
    }
    .comment-form input:focus, .comment-form textarea:focus { border-color: var(--accent, #1a73e8); }
    .comment-form input { flex: 1; min-width: 150px; }
    .comment-form textarea { width: 100%; min-height: 80px; resize: vertical; }
    .comment-form .btn {
      padding: 8px 24px; border: none; background: #1a73e8; color: #fff;
      font-size: .9rem; border-radius: 6px; cursor: pointer; transition: opacity .2s;
    }
    .comment-form .btn:hover { opacity: .85; }
    .comment-form .btn:disabled { opacity: .5; cursor: not-allowed; }
    .comment-msg { font-size: .85rem; margin-top: 6px; }
    .comment-msg.success { color: #27ae60; }
    .comment-msg.error { color: var(--danger, #c0392b); }

    .comment-list { list-style: none; padding: 0; }
    .comment-item {
      padding: 16px 0; border-bottom: 1px solid var(--border);
    }
    .comment-item .cmt-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
    }
    .comment-item .cmt-author { font-weight: 600; font-size: .9rem; }
    .comment-item .cmt-time { font-size: .8rem; color: var(--muted); }
    .comment-item .cmt-content { font-size: .9rem; line-height: 1.6; word-break: break-word; }
    .no-comments { color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/" class="home">Hankv Blog</a>
    <div class="nav-right">
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <button onclick="toggleTheme()" style="background:none;border:none;color:var(--text);cursor:pointer;font-size:1.1rem">&#9788;/&#9790;</button>
    </div>
  </nav>

  <div id="postContainer" class="loading" data-i18n="loading">Loading...</div>

  <!-- 评论区 -->
  <div id="commentSection" class="comment-section" style="display:none">
    <h3 data-i18n="comments_title">Comments</h3>
    <div class="comment-form">
      <div class="row">
        <input type="text" id="cmtAuthor" data-i18n-ph="comment_name_ph" maxlength="50" />
        <input type="text" id="cmtHp" style="display:none" tabindex="-1" autocomplete="off" />
      </div>
      <textarea id="cmtContent" data-i18n-ph="comment_content_ph" maxlength="5000"></textarea>
      <div style="margin-top:10px">
        <button class="btn" id="cmtSubmit" onclick="submitComment()" data-i18n="comment_submit">Submit</button>
        <span class="comment-msg" id="cmtMsg"></span>
      </div>
    </div>
    <ul class="comment-list" id="commentList"></ul>
  </div>

  <div class="back-link"><a href="/" data-i18n="back_home">← Back to Home</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/i18n.js"></script>
<script>
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }

  function toggleTheme() {
    var r = document.documentElement;
    r.setAttribute("data-theme", r.getAttribute("data-theme") === "dark" ? "light" : "dark");
  }

  function renderContent(content, contentType) {
    if (contentType === "markdown" && typeof marked !== 'undefined') {
      return marked.parse(content);
    }
    return content;
  }

  var params = new URLSearchParams(window.location.search);
  var slug = params.get("slug");

  async function loadPost() {
    var container = document.getElementById("postContainer");
    if (!slug) {
      container.className = "error";
      container.innerHTML = '<p>' + tt("no_post") + '</p><p><a href="/">' + tt("go_home") + '</a></p>';
      return;
    }

    try {
      var res = await fetch("/api/posts/" + slug);
      if (!res.ok) {
        container.className = "error";
        container.innerHTML = '<p>' + tt("post_not_found") + '</p><p><a href="/">' + tt("go_home") + '</a></p>';
        return;
      }
      var post = await res.json();
      var contentType = post.content_type || "html";

      document.title = post.title + " — Hankv Blog";

      // 填充 OG / description meta，增强 Edge 阅读模式与社交分享识别
      setMeta('meta[name="description"]', post.excerpt || post.title);
      setMeta('meta[property="og:title"]', post.title);
      setMeta('meta[property="og:url"]', window.location.href);
      setMeta('meta[property="og:description"]', post.excerpt || post.title);

      var tagsHtml = "";
      if (post.tags && post.tags.length) {
        tagsHtml = '<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">' +
          post.tags.map(function(t) { return '<span class="tag">' + esc(t) + '</span>'; }).join("") +
          '</div>';
      }

      container.className = "";
      container.innerHTML =
        '<article itemscope itemtype="https://schema.org/Article">' +
        '<div class="post-header">' +
        '<h1 itemprop="headline">' + esc(post.title) + '</h1>' +
        '<div class="meta">' +
        '<time itemprop="datePublished" datetime="' + esc(post.created_at) + '">' + new Date(post.created_at).toLocaleDateString("zh-CN", {year:"numeric",month:"long",day:"numeric"}) + '</time>' +
        '<span itemprop="articleSection">' + esc(post.category || "") + '</span>' +
        '</div>' +
        tagsHtml +
        '</div>' +
        '<div class="post-body" itemprop="articleBody">' + renderContent(post.content, contentType) + '</div>' +
        '</article>';

      // 注入 Schema.org JSON-LD 结构化数据，帮助阅读模式/搜索引擎识别正文
      injectJsonLd(post);

      // 加载评论区
      document.getElementById("commentSection").style.display = "block";
      loadComments();
    } catch (e) {
      container.className = "error";
      container.innerHTML = '<p>' + tt("post_load_failed") + '</p><button onclick="loadPost()">' + tt("retry") + '</button>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // 设置 head 中的 meta 标签内容（若不存在则跳过）
  function setMeta(selector, value) {
    var el = document.head.querySelector(selector);
    if (el) el.setAttribute("content", value);
  }

  // 注入 Article 的 JSON-LD 结构化数据
  function injectJsonLd(post) {
    var old = document.getElementById("articleJsonLd");
    if (old) old.remove();
    var data = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "datePublished": post.created_at,
      "dateModified": post.updated_at || post.created_at,
      "articleSection": post.category,
      "keywords": (post.tags || []).join(", "),
      "description": post.excerpt || "",
      "mainEntityOfPage": window.location.href
    };
    var s = document.createElement("script");
    s.type = "application/ld+json";
    s.id = "articleJsonLd";
    s.textContent = JSON.stringify(data);
    document.head.appendChild(s);
  }

  // ===== 评论功能 =====
  async function loadComments() {
    var list = document.getElementById("commentList");
    try {
      var res = await fetch("/api/comments/" + encodeURIComponent(slug));
      if (!res.ok) throw new Error("Failed");
      var comments = await res.json();
      if (!comments.length) {
        list.innerHTML = '<li class="no-comments">' + tt("no_comments") + '</li>';
        return;
      }
      list.innerHTML = comments.map(function(c) {
        return '<li class="comment-item">' +
          '<div class="cmt-header">' +
          '<span class="cmt-author">' + esc(c.author) + '</span>' +
          '<span class="cmt-time">' + new Date(c.created_at).toLocaleDateString("zh-CN", {year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}) + '</span>' +
          '</div>' +
          '<div class="cmt-content">' + esc(c.content) + '</div>' +
          '</li>';
      }).join("");
    } catch (e) {
      list.innerHTML = '<li class="no-comments">' + tt("load_comments_failed") + '</li>';
    }
  }

  async function submitComment() {
    var author = document.getElementById("cmtAuthor").value.trim();
    var content = document.getElementById("cmtContent").value.trim();
    var msg = document.getElementById("cmtMsg");
    var btn = document.getElementById("cmtSubmit");

    if (!author) { msg.textContent = tt("need_name"); msg.className = "comment-msg error"; return; }
    if (!content) { msg.textContent = tt("need_comment"); msg.className = "comment-msg error"; return; }

    // 简易蜜罐：隐藏字段非空则静默拒绝
    if (document.getElementById("cmtHp").value) return;

    btn.disabled = true;
    btn.textContent = "...";
    msg.textContent = "";
    msg.className = "comment-msg";

    try {
      var res = await fetch("/api/comments/" + encodeURIComponent(slug), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ author: author, content: content })
      });
      if (!res.ok) {
        var e = await res.json();
        throw new Error(e.error || "Submit failed");
      }
      document.getElementById("cmtContent").value = "";
      msg.textContent = tt("comment_success");
      msg.className = "comment-msg success";
      loadComments();
    } catch (e) {
      msg.textContent = tt("comment_failed") + ": " + e.message;
      msg.className = "comment-msg error";
    }
    btn.disabled = false;
    btn.textContent = tt("comment_submit");
  }

  loadPost();
</script>
</body>
</html>
