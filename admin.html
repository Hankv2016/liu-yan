<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Hankv2016 Blog</title>
  <style>
    :root, [data-theme="light"] {
      --bg: #ffffff; --text: #1a1a1a;
      --border: #d0d0d0; --accent: #0051c3;
      --card: #f8f8f8; --danger: #c0392b;
    }
    [data-theme="dark"] {
      --bg: #111111; --text: #e0e0e0;
      --border: #333; --accent: #5b9bd5;
      --card: #1a1a1a; --danger: #e74c3c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background .3s, color .3s;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
      flex-wrap: wrap; gap: 8px;
    }
    .top-bar h1 { font-size: 1.3rem; }
    .top-bar a { color: var(--text); text-decoration: none; opacity: .7; font-size: .9rem; }
    .top-bar a:hover { opacity: 1; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }
    .lang-select {
      padding: 2px 6px; font-size: 0.8rem;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; opacity: 0.7; border-radius: 4px; cursor: pointer;
    }
    .lang-select:focus { opacity: 1; }

    /* 登录区 */
    .login-box {
      max-width: 400px; margin: 80px auto; text-align: center;
      padding: 40px; border: 1px solid var(--border); border-radius: 8px;
    }
    .login-box h2 { margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 10px 14px; margin-bottom: 16px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-size: 1rem; outline: none; border-radius: 4px;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button, .btn {
      padding: 10px 28px; border: none; background: var(--accent); color: #fff;
      font-size: 1rem; border-radius: 4px; cursor: pointer; transition: opacity .2s;
    }
    .btn:hover, .login-box button:hover { opacity: .85; }
    .btn-outline {
      background: transparent; border: 1px solid var(--accent); color: var(--accent);
    }
    .btn-danger { background: var(--danger); }
    .btn-sm { padding: 4px 12px; font-size: .85rem; }

    /* 编辑区 */
    .editor { display: none; }
    .editor.active { display: block; }
    .editor-header {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: .8rem; opacity: .7; }
    .field input, .field select {
      padding: 8px 12px; border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: .95rem; outline: none; border-radius: 4px;
      min-width: 180px;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .field.slug input { min-width: 220px; }
    .field.title { flex: 1; min-width: 300px; }
    .field.title input { width: 100%; }
    textarea#contentInput {
      width: 100%; min-height: 400px; padding: 14px; font: 15px/1.7 monospace;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      outline: none; border-radius: 4px; resize: vertical; margin-bottom: 12px;
    }
    textarea#contentInput:focus { border-color: var(--accent); }
    .editor-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .msg { font-size: .9rem; opacity: .7; }

    /* 文章列表 */
    .post-list { margin-top: 40px; }
    .post-list h3 { margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
    .post-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 16px; background: var(--card); border-radius: 6px; margin-bottom: 8px;
    }
    .post-item .info { flex: 1; min-width: 0; }
    .post-item .title { font-weight: 600; margin-bottom: 2px; }
    .post-item .meta { font-size: .8rem; opacity: .6; }
    .post-item .actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* 预览弹出层 */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 100; justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg); max-width: 800px; width: 90%; max-height: 80vh;
      border-radius: 8px; padding: 32px; overflow-y: auto;
    }
    .modal-close { float: right; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }

    @media (max-width: 600px) {
      .field { width: 100%; }
      .field input, .field select { min-width: 0 !important; width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1 data-i18n="blog_admin">Blog Admin</h1>
    <div class="top-bar-right">
      <a href="/" target="_blank" data-i18n="view_site">View Site</a>
      <select id="langSelect" class="lang-select" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <button class="btn btn-sm btn-outline" onclick="toggleTheme()">&#9788;/&#9790;</button>
    </div>
  </div>

  <!-- ===== 登录 ===== -->
  <div id="loginBox" class="login-box">
    <h2 data-i18n="admin_login">Admin Login</h2>
    <input type="password" id="passwordInput" data-i18n-ph="admin_password" />
    <button onclick="login()" data-i18n="login_btn">Login</button>
    <p class="msg" id="loginMsg"></p>
  </div>

  <!-- ===== 编辑器 + 文章列表 ===== -->
  <div id="editor" class="editor">
    <div class="editor-header">
      <div class="field title">
        <label data-i18n="title_label">Title</label>
        <input type="text" id="titleInput" data-i18n-ph="title_ph" />
      </div>
      <div class="field slug">
        <label data-i18n="slug_label">Slug</label>
        <input type="text" id="slugInput" data-i18n-ph="slug_ph" />
      </div>
      <div class="field">
        <label data-i18n="category_label">Category</label>
        <input type="text" id="catInput" data-i18n-ph="category_ph" />
      </div>
      <div class="field">
        <label data-i18n="tags_label">Tags (comma)</label>
        <input type="text" id="tagsInput" data-i18n-ph="tags_ph" />
      </div>
      <div class="field" style="min-width:130px">
        <label data-i18n="content_type_label">Content Type</label>
        <select id="contentTypeSelect" onchange="onContentTypeChange()">
          <option value="html" data-i18n="content_html">HTML</option>
          <option value="markdown" data-i18n="content_markdown">Markdown</option>
        </select>
      </div>
    </div>

    <textarea id="contentInput" data-i18n-ph="content_ph_html"></textarea>

    <div class="editor-actions">
      <button class="btn" id="saveBtn" onclick="savePost()" data-i18n="publish">Publish</button>
      <button class="btn btn-outline" onclick="previewPost()" data-i18n="preview">Preview</button>
      <button class="btn btn-outline" onclick="newPost()" data-i18n="new_draft">New Draft</button>
      <span class="msg" id="editMsg"></span>
    </div>

    <!-- 文章列表 -->
    <div class="post-list">
      <h3 data-i18n="all_posts">All Posts</h3>
      <div id="postList"></div>
    </div>
  </div>
</div>

<!-- 预览弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closePreview(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/i18n.js"></script>
<script>
  // 配置 marked
  if (typeof marked !== 'undefined') {
    marked.setOptions({ breaks: true, gfm: true });
  }

  var token = localStorage.getItem("admin_token") || "";
  var editingSlug = null;
  var currentContentType = "html";

  if (token) { showEditor(); loadPosts(); }

  function toggleTheme() {
    var r = document.documentElement;
    r.setAttribute("data-theme", r.getAttribute("data-theme") === "dark" ? "light" : "dark");
  }

  function onContentTypeChange() {
    var sel = document.getElementById("contentTypeSelect");
    currentContentType = sel.value;
    var ta = document.getElementById("contentInput");
    if (currentContentType === "markdown") {
      ta.setAttribute("data-i18n-ph", "content_ph_md");
    } else {
      ta.setAttribute("data-i18n-ph", "content_ph_html");
    }
    applyAllTranslations();
  }

  function renderContent(content, contentType) {
    if (contentType === "markdown" && typeof marked !== 'undefined') {
      return marked.parse(content);
    }
    return content;
  }

  // ===== 登录 =====
  async function login() {
    var pw = document.getElementById("passwordInput").value;
    token = pw;
    try {
      var res = await fetch("/api/posts", { headers: { "Authorization": "Bearer " + pw } });
      if (res.status === 401) throw new Error(tt("wrong_password"));
      localStorage.setItem("admin_token", pw);
      showEditor();
      loadPosts();
    } catch (e) {
      document.getElementById("loginMsg").textContent = tt("login_failed_prefix") + e.message;
      token = "";
    }
  }

  function showEditor() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("editor").classList.add("active");
  }

  function logout() {
    localStorage.removeItem("admin_token");
    token = "";
    location.reload();
  }

  function authHeaders() {
    return { "Authorization": "Bearer " + token, "Content-Type": "application/json" };
  }

  // ===== 编辑器 =====
  function newPost() {
    editingSlug = null;
    document.getElementById("titleInput").value = "";
    document.getElementById("slugInput").value = "";
    document.getElementById("catInput").value = "";
    document.getElementById("tagsInput").value = "";
    document.getElementById("contentInput").value = "";
    document.getElementById("contentTypeSelect").value = "html";
    currentContentType = "html";
    onContentTypeChange();
    document.getElementById("saveBtn").textContent = tt("publish");
    document.getElementById("editMsg").textContent = "";
    document.getElementById("titleInput").focus();
  }

  async function savePost() {
    var title = document.getElementById("titleInput").value.trim();
    var content = document.getElementById("contentInput").value.trim();
    var slug = document.getElementById("slugInput").value.trim();
    var category = document.getElementById("catInput").value.trim();
    var tags = document.getElementById("tagsInput").value.split(",").map(function(t) { return t.trim(); }).filter(Boolean);
    var contentType = document.getElementById("contentTypeSelect").value;

    if (!title) return msg(tt("need_title"), true);
    if (!content) return msg(tt("need_content"), true);
    if (!slug) {
      slug = title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-").replace(/^-|-$/g, "");
      document.getElementById("slugInput").value = slug;
    }

    var body = { title: title, content: content, slug: slug, category: category, tags: tags, content_type: contentType };
    var method = editingSlug ? "PUT" : "POST";
    var url = editingSlug ? "/api/posts/" + editingSlug : "/api/posts";

    try {
      var res = await fetch(url, { method: method, headers: authHeaders(), body: JSON.stringify(body) });
      if (res.status === 401) return logout();
      if (!res.ok) {
        var e = await res.json();
        return msg(tt("error_prefix") + (e.error || tt("unknown")), true);
      }
      msg(tt("saved"));
      editingSlug = slug;
      document.getElementById("saveBtn").textContent = tt("update_btn");
      loadPosts();
    } catch (e) {
      msg(tt("network_error") + ": " + e.message, true);
    }
  }

  function msg(text, isErr) {
    var el = document.getElementById("editMsg");
    el.textContent = text;
    el.style.color = isErr ? "var(--danger)" : "";
    setTimeout(function() { el.textContent = ""; }, 3000);
  }

  // ===== 文章列表 =====
  async function loadPosts() {
    var container = document.getElementById("postList");
    try {
      var res = await fetch("/api/posts");
      if (!res.ok) throw new Error("Load failed");
      var posts = await res.json();
      if (!posts.length) {
        container.innerHTML = "<p style='opacity:.5'>" + tt("no_posts_yet") + "</p>";
        return;
      }
      container.innerHTML = posts.map(function(p) {
        return '<div class="post-item"><div class="info"><div class="title">' + esc(p.title) + '</div><div class="meta">' + esc(p.slug) + ' &middot; ' + new Date(p.created_at).toLocaleDateString() + ' &middot; ' + esc(p.category || '') + '</div></div><div class="actions"><button class="btn btn-sm btn-outline" onclick="editPost(\'' + esc(p.slug) + '\')">' + tt("edit") + '</button> <button class="btn btn-sm btn-danger" onclick="deletePost(\'' + esc(p.slug) + '\')">' + tt("delete") + '</button></div></div>';
      }).join("");
    } catch (e) {
      container.innerHTML = "<p style='opacity:.5'>" + tt("load_posts_failed") + "</p>";
    }
  }

  async function editPost(slug) {
    try {
      var res = await fetch("/api/posts/" + slug);
      if (!res.ok) return msg(tt("post_not_found_err"), true);
      var p = await res.json();
      editingSlug = slug;
      document.getElementById("titleInput").value = p.title;
      document.getElementById("slugInput").value = p.slug;
      document.getElementById("catInput").value = p.category || "";
      document.getElementById("tagsInput").value = (p.tags || []).join(", ");
      document.getElementById("contentInput").value = p.content;
      currentContentType = p.content_type || "html";
      document.getElementById("contentTypeSelect").value = currentContentType;
      onContentTypeChange();
      document.getElementById("saveBtn").textContent = tt("update_btn");
      document.getElementById("editMsg").textContent = "";
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (e) {
      msg(tt("load_error"), true);
    }
  }

  async function deletePost(slug) {
    var msg = tt("delete_confirm", { slug: slug });
    if (!confirm(msg)) return;
    try {
      var res = await fetch("/api/posts/" + slug, { method: "DELETE", headers: authHeaders() });
      if (res.status === 401) return logout();
      if (!res.ok) throw new Error("Delete failed");
      loadPosts();
      if (editingSlug === slug) newPost();
    } catch (e) {
      msg(tt("delete_error") + ": " + e.message, true);
    }
  }

  // ===== 预览 =====
  function previewPost() {
    var title = document.getElementById("titleInput").value || tt("untitled");
    var content = document.getElementById("contentInput").value || "<p>" + tt("no_content") + "</p>";
    var contentType = document.getElementById("contentTypeSelect").value;
    var rendered = renderContent(content, contentType);
    document.getElementById("modalContent").innerHTML =
      '<button class="modal-close" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'active\')">&times;</button>' +
      '<h1>' + esc(title) + '</h1>' +
      '<div style="margin-top:24px">' + rendered + '</div>';
    document.getElementById("modalOverlay").classList.add("active");
  }

  function closePreview(e) {
    if (e.target === document.getElementById("modalOverlay")) {
      document.getElementById("modalOverlay").classList.remove("active");
    }
  }

  function esc(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // Ctrl+S 保存
  document.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "s") {
      e.preventDefault();
      if (document.getElementById("editor").classList.contains("active")) savePost();
    }
  });

  // 语言切换后更新保存按钮文字
  var origSetLang = setLang;
  setLang = function(lang) {
    origSetLang(lang);
    // 更新保存按钮文字
    var btn = document.getElementById("saveBtn");
    if (btn && editingSlug) btn.textContent = tt("update_btn");
    else if (btn) btn.textContent = tt("publish");
    // 更新文章列表按钮
    loadPosts();
    // 更新 textarea placeholder
    onContentTypeChange();
  };
</script>
</body>
</html>
